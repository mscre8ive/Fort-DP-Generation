<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fort Fest 2026 DP Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0ece8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .app {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.1);
    padding: 2.5rem;
    display: flex;
    gap: 3rem;
    align-items: flex-start;
    max-width: 1000px;
    width: 100%;
  }
  .controls { flex: 0 0 290px; display: flex; flex-direction: column; gap: 1.4rem; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.55rem; color: #1a1a1a; line-height: 1.25; }
  .subtitle { font-size: 0.875rem; color: #777; line-height: 1.5; margin-top: 0.3rem; }
  .upload-zone {
    border: 2px dashed #e8b0b0;
    border-radius: 12px;
    padding: 1.75rem 1rem;
    text-align: center;
    cursor: pointer;
    background: #fff9f9;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover { border-color: #c0392b; background: #fff3f3; }
  .upload-icon {
    width: 42px; height: 42px; margin: 0 auto 0.6rem;
    background: #fde8e8; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-label { font-size: 0.875rem; color: #444; font-weight: 500; }
  .upload-hint { font-size: 0.75rem; color: #bbb; margin-top: 0.25rem; }
  .section-label { font-size: 0.8rem; font-weight: 600; color: #555; letter-spacing: 0.5px; text-transform: uppercase; }
  .zoom-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .zoom-row input[type=range] {
    flex: 1; -webkit-appearance: none; height: 5px;
    border-radius: 3px; background: #e8e8e8; outline: none; cursor: pointer;
  }
  .zoom-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: #c0392b; cursor: pointer;
    box-shadow: 0 2px 6px rgba(192,57,43,0.35);
  }
  .zoom-val { font-size: 0.85rem; font-weight: 600; color: #c0392b; min-width: 46px; text-align: right; }
  .tip { font-size: 0.8rem; color: #999; background: #fafafa; border-radius: 8px; padding: 0.7rem; line-height: 1.5; border: 1px solid #f0f0f0; }
  .download-btn {
    background: #c0392b; color: white; border: none; border-radius: 10px;
    padding: 0.9rem; font-size: 0.95rem; font-weight: 600; font-family: inherit;
    cursor: pointer; width: 100%; transition: background 0.2s, transform 0.1s;
  }
  .download-btn:hover { background: #a93226; }
  .download-btn:active { transform: scale(0.98); }
  .download-btn:disabled { background: #ccc; cursor: not-allowed; }
  .preview-panel { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
  .preview-label { font-size: 0.75rem; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
  .canvas-wrapper { width: 100%; max-width: 380px; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.13); }
  #outputCanvas { display: block; width: 100%; height: auto; cursor: grab; }
  #outputCanvas:active { cursor: grabbing; }
  @media (max-width: 680px) { .app { flex-direction: column; gap: 1.5rem; } .controls { flex: none; width: 100%; } }
</style>
</head>
<body>
<div class="app">
  <div class="controls">
    <div>
      <h1>Fort Fest 2026<br>DP Generator</h1>
      <p class="subtitle">Upload your photo, drag to position, slide to zoom, then download.</p>
    </div>

    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <div class="upload-icon">
        <svg width="20" height="20" fill="none" stroke="#c0392b" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
      </div>
      <div class="upload-label" id="uploadLabel">Click to upload your image</div>
      <div class="upload-hint">JPG, PNG, WEBP</div>
    </div>

    <div>
      <div class="section-label">Zoom</div>
      <div class="zoom-row">
        <input type="range" id="zoomSlider" min="10" max="300" value="100" step="1">
        <span class="zoom-val" id="zoomVal">100%</span>
      </div>
    </div>

    <p class="tip" id="tipText">Upload a photo — it will appear inside the red circle. Drag to reposition.</p>

    <button class="download-btn" id="dlBtn" disabled>Download DP</button>
  </div>

  <div class="preview-panel">
    <span class="preview-label">Preview</span>
    <div class="canvas-wrapper">
      <canvas id="outputCanvas"></canvas>
    </div>
  </div>
</div>

    // Draw user photo clipped strictly to the circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, CR, 0, Math.PI * 2);
    ctx.clip();
    const drawW = userImg.naturalWidth * zoom;
    const drawH = userImg.naturalHeight * zoom;
    ctx.drawImage(userImg, imgX - drawW / 2, imgY - drawH / 2, drawW, drawH);
    ctx.restore();
  }

  // Draw the frame on top of everything
  if (frameLoaded) {
    ctx.drawImage(frame, 0, 0, CW, CH);

    // Now punch the user photo back through the white circle area of the frame
    if (userImg) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(CX, CY, CR, 0, Math.PI * 2);
      ctx.clip();
      const drawW = userImg.naturalWidth * zoom;
      const drawH = userImg.naturalHeight * zoom;
      ctx.drawImage(userImg, imgX - drawW / 2, imgY - drawH / 2, drawW, drawH);
      ctx.restore();

      // Redraw the ring border on top so it overlaps the photo edges cleanly
      ctx.save();
      ctx.beginPath();
      // Ring = donut between CR+ringWidth and CR
      ctx.arc(CX, CY, CR + 14, 0, Math.PI * 2, false);
      ctx.arc(CX, CY, CR,      0, Math.PI * 2, true);
      ctx.clip();
      ctx.drawImage(frame, 0, 0, CW, CH);
      ctx.restore();
    }
  }
}

// Scale pointer coordinates from displayed canvas size to internal canvas size
function canvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top)  * scaleY
  };
}

// Load image from File object
function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      userImg = img;

      // Set initial zoom so the image fills the circle (cover)
      const minDim = Math.min(img.naturalWidth, img.naturalHeight);
      zoom = (CR * 2) / minDim;

      // Sync slider: slider range 10–300, value = zoom*100 clamped
      const sliderVal = Math.round(zoom * 100);
      document.getElementById('zoomSlider').value = Math.min(300, Math.max(10, sliderVal));
      document.getElementById('zoomVal').textContent = Math.round(zoom * 100) + '%';

      // Centre the photo over the circle
      imgX = CX;
      imgY = CY;

      document.getElementById('dlBtn').disabled = false;
      document.getElementById('tipText').textContent = 'Drag your photo to reposition it inside the circle.';
      const n = file.name;
      document.getElementById('uploadLabel').textContent = n.length > 28 ? n.slice(0, 26) + '…' : n;
      draw();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('fileInput').addEventListener('change', function () {
  loadFile(this.files[0]);
});

// Drag to reposition
canvas.addEventListener('mousedown', e => {
  if (!userImg) return;
  dragging = true;
  const p = canvasPos(e);
  dragX0 = p.x; dragY0 = p.y;
  imgX0 = imgX; imgY0 = imgY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const p = canvasPos(e);
  imgX = imgX0 + (p.x - dragX0);
  imgY = imgY0 + (p.y - dragY0);
  draw();
});
window.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('touchstart', e => {
  if (!userImg) return;
  if (e.touches.length === 1) { 
    e.preventDefault();
    dragging = true;
    const p = canvasPos(e);
    dragX0 = p.x; dragY0 = p.y;
    imgX0 = imgX; imgY0 = imgY;
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist0 = Math.hypot(dx, dy);
    pinchZoom0 = zoom;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!userImg) return;
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const p = canvasPos(e);
    imgX = imgX0 + (p.x - dragX0);
    imgY = imgY0 + (p.y - dragY0);
    draw();
  } else if (e.touches.length === 2 && pinchDist0) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d = Math.hypot(dx, dy);
    zoom = Math.max(0.1, Math.min(5, pinchZoom0 * d / pinchDist0));
    const sv = Math.round(zoom * 100);
    document.getElementById('zoomSlider').value = Math.min(300, Math.max(10, sv));
    document.getElementById('zoomVal').textContent = sv + '%';
    draw();
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { dragging = false; pinchDist0 = null; });

// Zoom slider — value is a direct percentage, zoom = value/100
document.getElementById('zoomSlider').addEventListener('input', function () {
  zoom = parseInt(this.value) / 100;
  document.getElementById('zoomVal').textContent = this.value + '%';
  draw();
});

// Drag & drop onto upload zone
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#c0392b'; });
zone.addEventListener('dragleave', () => { zone.style.borderColor = '#e8b0b0'; });
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.style.borderColor = '#e8b0b0';
  loadFile(e.dataTransfer.files[0]);
});

// Download
document.getElementById('dlBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'FortFest2026_DP.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
