<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fort Fest DP Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="panel">
      <h1>Fort Fest 2026 DP Generator</h1>
      <p class="subtitle">Upload your photo and place it inside the circle.</p>

      <div class="upload">
        <input type="file" id="photoInput" accept="image/*">
        <p>Upload your image</p>
      </div>

      <div class="controls" id="controls">
        <label>Zoom: <span id="zoomVal">100%</span></label>
        <input type="range" id="zoom" min="50" max="300" value="100">
      </div>

      <button id="downloadBtn" disabled>Download DP</button>
    </div>

    <div class="stage">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
